# Stack completo: Nginx+SPA (puerto host FRONTEND_PORT, típ. 3006) → API (8086) → Postgres (54326).
# Ver README interno del equipo / DEPLOY-EQUIPO1.md para VPS solo con server.js (sin este compose).

services:
  # Build multi-etapa: `vite build` + Nginx según Dockerfile raíz (sirve dist + proxifica /api).
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Qué bakea Vite: si true, el bundle llama a /api/productos (Nginx del mismo compose proxifica).
        VITE_USE_API: ${VITE_USE_API:-true}
        # Prefijo de las rutas API desde el navegador (debe coincidir con location /api/ en nginx.conf).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: regalomagico-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3006}:80"
    restart: unless-stopped
    networks:
      - regalomagico-net

  # API Express + pg; espera a Postgres healthy antes de arrancar bien.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: regalomagico-backend:local
    container_name: regalomagico-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT_INTERNAL:-8085}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-regalomagico1}
      DB_USER: ${DB_USER:-equipo1}
      DB_PASSWORD: ${DB_PASSWORD:-equipo1pass}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    ports:
      - "${BACKEND_PORT_HOST:-8086}:${BACKEND_PORT_INTERNAL:-8085}"
    restart: unless-stopped
    networks:
      - regalomagico-net

  # Postgres 16; ejecuta SQL en ./bd al crear el volumen por primera vez.
  db:
    image: postgres:16
    container_name: regalomagico-db
    environment:
      POSTGRES_DB: ${DB_NAME:-regalomagico1}
      POSTGRES_USER: ${DB_USER:-equipo1}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-equipo1pass}
    ports:
      - "${DB_PORT_HOST:-54326}:5432"
    volumes:
      - regalomagico-db-data:/var/lib/postgresql/data
      - ./bd:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-equipo1} -d ${DB_NAME:-regalomagico1}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - regalomagico-net

# Datos persistentes de Postgres (supervivencia entre down/up; borrar volumen = BD nueva).
volumes:
  regalomagico-db-data:

# Red privada: frontend resuelve el hostname `backend`, backend resuelve `db`.
networks:
  regalomagico-net:
    name: regalomagico_regalomagico-net
