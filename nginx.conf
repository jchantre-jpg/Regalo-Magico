# Config incluida en la imagen Docker del frontend.
# Sirve la SPA y reenvía /api/* al contenedor `backend` (nombre del servicio en docker-compose).

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión para texto y JSON (menos peso en redes lentas).
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Reduce riesgo de MIME sniffing en navegadores antiguos.
    add_header X-Content-Type-Options "nosniff" always;

    # API REST del servicio Node (mismo path que usa el front con VITE_API_BASE_URL=/api).
    location /api/ {
        # Debe coincidir con PORT del servicio backend en Docker (p. ej. PORT=8085 en compose).
        proxy_pass http://backend:8085/api/;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: rutas como /productos no son archivos → caen a index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Siempre pedir HTML fresco (evita que un deploy viejo quede cacheado agresivamente).
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Bundles de Vite con hash en nombre: cache largo e immutable.
    location ~* ^/assets/.*\.[a-f0-9]+\.(js|css)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Imágenes y fuentes en public/: cache moderado (sin hash en nombre).
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Fallback para .html/.js sin hash (dev-build o archivos sueltos): no cachear fuerte.
    location ~* \.(?:html|js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
}
