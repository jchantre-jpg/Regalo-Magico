name: Deploy VPS Equipo 1

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-equipo1-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validar secretos de deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          WORK_DIR: ${{ secrets.WORK_DIR }}
        run: |
          set -eu
          [ -n "$SSH_HOST" ] || { echo "::error::Falta secret SSH_HOST"; exit 1; }
          [ -n "$SSH_USER" ] || { echo "::error::Falta secret SSH_USER"; exit 1; }
          [ -n "$SSH_PRIVATE_KEY" ] || { echo "::error::Falta secret SSH_PRIVATE_KEY"; exit 1; }
          [ -n "$WORK_DIR" ] || { echo "::error::Falta secret WORK_DIR"; exit 1; }
          if [ -z "${SSH_PORT:-}" ]; then
            echo "::warning::SSH_PORT vacío; se usará 22"
          fi

      - name: Deploy en VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          debug: true
          script_stop: true
          script: |
            set -eu
            cd ${{ secrets.WORK_DIR }}
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            npm ci
            npm run build
            if pm2 describe equipo1-regalo_magico >/dev/null 2>&1; then
              pm2 restart equipo1-regalo_magico
            else
              pm2 start server.js --name equipo1-regalo_magico
            fi
            pm2 save
            SMOKE_URL="http://127.0.0.1:3006/health"
            echo "Ejecutando smoke test: ${SMOKE_URL}"
            if ! curl -fsS --max-time 15 "${SMOKE_URL}" >/dev/null; then
              echo "::error::Smoke test fallo en ${SMOKE_URL}"
              pm2 logs equipo1-regalo_magico --lines 40 --nostream || true
              exit 1
            fi
            echo "Smoke test OK"
